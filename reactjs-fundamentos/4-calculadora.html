<!DOCTYPE html>
<html lang="en" >
<head >
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet" />

    <title>Rocketseat - React.js - Fundamentos</title>

    <style type="text/tailwindcss">
        @theme{
            --text: #EBEBEB;
            --text-secondary: #6B6B6B;
            --primary: #462878;
            --background: #2D2A37;

            --gradient: 
                180deg, 
                rgba(0, 0, 0, 0.05) 0%, 
                rgba(255, 255, 255, 0.05) 100%;

            --gradient-hover: 
                180deg, 
                rgba(0, 0, 0, 0.1) 0%, 
                rgba(255, 255, 255, 0.1) 100%;
        
            --shadow: 
                0px 11px 7px 0px rgba(0, 0, 0, 0.01), 
                0px 7px 7px 0px rgba(0, 0, 0, 0.04), 
                0px 4px 6px 0px rgba(0, 0, 0, 0.10), 
                0px 2px 4px 0px rgba(0, 0, 0, 0.26), 
                0px 0px 2px 0px rgba(0, 0, 0, 0.29), 
                0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;
        
            --font-sans: 'Rubik', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-linear-[180deg,_#8E7ECE_0%,_#8E7ECE_100%] text-(--text) font-(--font-sans)">  
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const textVariants = {
            default: 'text-xl', //12
            muted: 'text-xl text-(--text-secondary)',
            heading: 'text-2xl', //24
            blast: 'text-3xl' //36
        };
        
        function Text({ 
            as='span', 
            varient = 'default',
            className,
            children, 
            ...props 
        }) {
            return React.createElement(
                as,
                {
                    className: `${textVariants[varient]} ${className ? className : ''}`,
                    ...props
                },
                children
            )
        }

        const buttonVariants = {
            default: 'bg-(--background)',
            primary: 'bg-(--primary)'
        };

        function Button({ 
            varient='default',
            className, 
            children,
            ...props 
        }) {
            return (
                <Text 
                    as='button' 
                    varient='heading'
                    className={`
                        flex items-center justify-center rounded-xl
                        p-3 cursor-pointer text-(--text) 
                        bg-linear-(--gradient) 
                        hover:bg-linear-(--gradient-hover) 
                        bg-linear-(--gradient)
                        shadow-(--shadow)
                        ${buttonVariants[varient]}
                        ${className ? className : ''}
                    `}
                    {...props}
                >
                {children}
                </Text>
            )
        }

        function Card({children, className, ...props}) {
            return (
                <div className={`
                    bg-(--background) shadow-(--shadow)
                    rounded-2xl
                    ${className ? className : ''}
                `}
                >
                    {children}
                </div>
            )
        }

        const buttons = [
            [
                { input: "CE" },
                { input: "C", className:"flex-1 h-16" }, /*"w-36 h-16"*/  
                { input: "/", varient:"primary" }   
            ],
            [
                { input: "7" },
                { input: "8"},   
                { input: "9"},   
                { input: "*", varient:"primary" }   
            ],
            [
                { input: "4" },
                { input: "5"},   
                { input: "6"},   
                { input: "-", varient:"primary" }   
            ],
            [
                { input: "1" },
                { input: "2"},   
                { input: "3"},   
                { input: "+", varient:"primary" }   
            ],
            [                         
                { input: "0", className:"flex-1 h-16"},/*"w-36 h-16"*/
                { input: ","},   
                { input: "=", className:"w-16 h-16 bg-[#7F45E2]" }   
            ],
        ];

        const CalculatorContext = React.createContext();

        function CalculatorProvider({children}) {
            const [history,setHistory] = React.useState([]);
            const historyStorageKey = 'history';

            React.useEffect(() => {
                const savedHistory = localStorage.getItem(historyStorageKey)
                setHistory(JSON.parse(savedHistory || '[]'))
            },[])

            function updateHistory(operation, parsedResult){
                setHistory((prev) => {
                    const updatedHistory = [
                        `${operation} = ${parsedResult}`,
                        ...prev
                    ];

                    localStorage.setItem(
                        historyStorageKey, 
                        JSON.stringify(updatedHistory)
                    )
                    return updatedHistory;
                })
            }

            return (
                <CalculatorContext.Provider
                    value={{history, updateHistory}}
                >
                    {children}
                </CalculatorContext.Provider>
            )

        }

        function useCalculator(){
            const [operation,setOperation] = React.useState('')
            const [result,setResult] = React.useState('')
            const {updateHistory} = React.useContext(CalculatorContext);
            
            function doOperation(input){
                if(input === "C"){
                    setOperation("");
                    setResult("");
                    return;
                }
                if(input === "CE"){
                    setOperation(operation.slice(0,-1));
                    setResult("");
                    return;
                }
                if(input === "="){
                    const operationResult = eval(operation.replace(/,/g, '.'));
                    const parsedResult = operationResult.toString()?.replace(/\./g, ',');
                    setResult(parsedResult);
                    updateHistory(operation,parsedResult);
                    return;
                }
                if(result){
                    setOperation(isNaN(input)
                        ?`${result}${input}`
                        : input
                    )
                    setResult("")
                    return;
                }
                if(input === "," && !operation.endsWith(',')){
                    setOperation(`${operation},`);
                    return;
                }

                setOperation(`${operation}${input}`);
            }

            return {
                operation,
                result,
                doOperation
            }
        }

        function CalculatorDisplay({ operation, result}) {
            return (
                <div className={`
                        flex flex-col gap-2 px-[1.375rem]
                        cursor-default select-none
                    `}>
                        <Text 
                            as="div" 
                            varient="muted" 
                            className="flex items-center justify-end h-7"
                        >
                        {result && operation}
                        </Text>
                        <div className={`
                              flex items-center justify-between h-9 
                        `}>
                            <Text varient="muted">=</Text>
                            <Text varient="blast">{result || operation}</Text>
                        </div>
                    </div>
            )
        }

        /*
        function Calculator() {
            return(
                <Card className={`
                    flex flex-col gap-[1.625rem] w-[22.25rem]
                    pt-14 px-8 pb-8
                `}
                >
                    <CalculatorDisplay operation="1 + 1" result="2" />

                    <div className="flex flex-col gap-3">
                        <div  className="flex gap-3">
                            <Button className="w-16 h-16">CE</Button>
                            <Button className="w-36 h-16">C</Button>
                            <Button className="w-16 h-16" varient="primary">/</Button>
                        </div>
                        <div  className="flex gap-3">
                            <Button className="w-16 h-16">7</Button>
                            <Button className="w-16 h-16">8</Button>
                            <Button className="w-16 h-16">9</Button>
                            <Button className="w-16 h-16" varient="primary">*</Button>
                        </div>
                        <div  className="flex gap-3">
                            <Button className="w-16 h-16">4</Button>
                            <Button className="w-16 h-16">5</Button>
                            <Button className="w-16 h-16">6</   Button>
                            <Button className="w-16 h-16" varient="primary">-</Button>
                        </div>
                        <div  className="flex gap-3">
                            <Button className="w-16 h-16">1</Button>
                            <Button className="w-16 h-16">2</Button>
                            <Button className="w-16 h-16">3</Button>
                            <Button className="w-16 h-16" varient="primary">+</Button>
                        </div>
                        <div  className="flex gap-3">
                            <Button className="w-36 h-16">0</Button>
                            <Button className="w-16 h-16">,</Button>
                            <Button className="w-16 h-16" varient="primary">=</Button>
                        </div>
                    </div>

                </Card>
            )
        }

        */

        function Calculator() {
            const { operation, result, doOperation } = useCalculator();

            function handleInputClick(input) {
                doOperation(input);
            }

            return(
                <Card className={`
                    flex flex-col gap-[1.625rem] w-[22.25rem]
                    pt-14 px-8 pb-8
                `}
                >
                    <CalculatorDisplay operation={operation} result={result} />

                    <div className="flex flex-col gap-3">
                        {buttons.map((row,index) =>( 
                            <div key={`row-${index}`} className="flex gap-3">
                                {row.map(button => 
                                    <Button 
                                        key={button.input} 
                                        className={button.className || "w-16 h-16"}
                                        varient={button.varient}
                                        onClick={() => handleInputClick(button.input)}
                                    >
                                        {button.input}
                                    </Button> 
                                )}
                            </div>
                        ))}
                        
                    </div>

                </Card>
            )
        }

        function OperationHistory(){
            const {history} = React.useContext(CalculatorContext);
            
            return(
                <Card className="w-full px-8 py-10">   
                    <Text 
                        as="h1" 
                        varient="heading"
                        className="mb-4"
                    >
                        Histórico de Operações
                    </Text>
                    {history.length > 0 ? (
                        <ul className="flex flex-col gap-3">
                            {history.map((value,index) =>
                                <Text 
                                    key={`item-${index}`}
                                    as="li"
                                >
                                    {value}
                                </Text>
                            )}
                        </ul>
                    ) : (
                        <Text as="p" varient="muted">Nunhuma operação recente...</Text>
                    )

                    }
                </Card>
            )
        }

        function App() {
            return(
                <main className={`
                    py-28 px-4 sm:px-10
                    flex flex-col sm:flex-row
                    items-center sm:items-stretch
                    gap-3
                `}
                >
                    <CalculatorProvider>
                        <Calculator />
                        <OperationHistory />
                    </CalculatorProvider>
                </main>
            )
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />)
    </script>
</body>
</html>
